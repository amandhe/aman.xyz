        - generic [ref=e34]:
          - heading "Success = Doing what you said you would, consistently" [level=1] [ref=e35]
          - paragraph [ref=e36]: Getting off the success treadmill.
          - link "Aman Dhesi 05 April 2021 . 1 min read" [ref=e38] [cursor=pointer]:
            - /url: /web/20250806030128/https://amandhesi.net/author/aman/
            - generic [ref=e39]:
              - generic [ref=e40]: Aman Dhesi
              - time [ref=e41]: 05 April 2021 .
              - text: 1 min read
        - generic [ref=e42]:
          - paragraph [ref=e43]:
            - text: Growing up I was told I could be anything I wanted, as long as it was either an engineer or a doctor.
            - strong [ref=e44]: I internalized this external definition of success.
          - paragraph [ref=e45]: I went about my college and early adult years doing the things I was supposed to do to be "successful" - perfect grades, great internships, a top graduate school.
          - paragraph [ref=e46]:
            - text: As I grew older, I realized that you could be "successful" doing anything. After all, the Youtuber Mr. Beast makes millions
            - link "building cities out of bouncy castles" [ref=e47] [cursor=pointer]:
              - /url: https://web.archive.org/web/20250806030128/https://www.youtube.com/watch?v=FwcXpFpluRQ
            - text: .
          - paragraph [ref=e48]:
            - text: If you're like me, you've had the experience where you did everything right, hit all the milestones you were supposed to to be successful, but still didn't
            - emphasis [ref=e49]: feel
            - text: successful. If that's you, you're on the
            - emphasis [ref=e50]: treadmill of external success.
          - figure [ref=e51]
          - paragraph [ref=e52]:
            - text: Success, I've realized, is more of a subjective, internal thing than an objective, external one. The best definition of internal success that I've found is this -
            - strong [ref=e53]: an internally successful person does what they said they would, consistently.
          - paragraph [ref=e54]: This definition is independent of what you do. You can be successful running a large company or robbing art galleries, as long as that's what you set out to do.
          - paragraph [ref=e55]: The opposite of success, then, is not doing the things you said you would. Or doing things that you didn't intend do, even if they are considered externally successful.
          - paragraph [ref=e56]:
            - text: As
            - link "Derek Sivers points out" [ref=e57] [cursor=pointer]:
              - /url: https://web.archive.org/web/20250806030128/https://tim.blog/2015/12/28/derek-sivers-reloaded-on-success-habits-and-billionaires-with-perfect-abs/
            - text: ", if Richard Branson's intention was to live a life of peace and quiet but he kept starting companies, he wouldn't be successful by his own standard. He wouldn't be doing what he said he would."
          - paragraph [ref=e58]: Once you become a person who consistently does what they say they will, you develop the confidence to take on bigger and bigger challenges. Small successes build upon each other and create an upward spiral of success.
          - paragraph [ref=e59]: And you stop measuring yourself by society's always-changing, always-out-of-reach yardstick of success. You get off the treadmill of external success.
